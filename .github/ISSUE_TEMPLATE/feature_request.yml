name: 功能建议
description: 建议新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你希望添加什么功能
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: 使用场景
      description: 在什么情况下会用这个功能
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 考虑过的其他方案
