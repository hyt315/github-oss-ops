name: Bug 报告
description: 报告遇到的问题或错误
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰描述遇到的问题
      placeholder: 发生了什么...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何让问题复现
      placeholder: |
        1. 打开...
        2. 输入...
        3. 看到错误...
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 截图、日志、环境信息等
