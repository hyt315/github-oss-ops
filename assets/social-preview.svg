      <circle cx="32" cy="34" r="12" fill="#a371f7"/>
      <text x="54" y="43" fill="#f0f6fc" font-size="22" font-weight="700">APPROVE</text>
      <text x="24" y="82" fill="#c9b6f2" font-size="18">Human checkpoint</text>
